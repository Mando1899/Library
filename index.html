<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <title>Mastermind Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="javascript.js" defer></script>
</head>
<body>
    <div class="main-contianer">
        <div class="header">
            <h1>Mastermind Library</h1>
        </div>

        <button class="open">Add Book</button>
        <dialog>
            <form action="/" method="GET">
                <div>
                    <label for="author">Author:</label>
                    <input type="text" value="lol" placeholder="Dostoyevsky" name="author" class="input-author" id="author" required>
                </div>
                <div>
                    <label for="title">Title:</label>
                    <input type="text" placeholder="Crime and Punishment" name="title" class="input-title" id="title" required>
                </div>
                <div>
                    <label for="pages">Number of pages:</label>
                    <input type="number" name="pages" class="input-pages" id="pages" required>
                </div>
                <button type="submit" class="add-book">Add Book</button>
            </form>
        </dialog>


        <div class="books">
            <div class="book">
                <span class="author">FYODOR DOSTOYEVSKY</span>
                <span class="title">Crime and Punishment</span>
                <span class="pages">600 pages</span>
            </div>
        </div>
    </div>
</body>
</html>
